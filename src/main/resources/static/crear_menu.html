<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Menú</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="crear-menu-body">

<div class="container py-5">

    <h1 class="text-center fw-bold crear-menu-title mb-4">CREAR MENÚ</h1>

    <div class="card crear-menu-card p-4">
        <!-- GERENTE -->
        <h3>Gerente</h3>
            <input type="text" class="crear-menu-input form-control mb-3" id="gerenteNombre" placeholder="Ingrese el nombre">
            <input type="text" class="crear-menu-input form-control mb-3" id="gerenteCedula" placeholder="Ingrese la cedula">
            <input type="text" class="crear-menu-input form-control mb-3" id="gerenteTelefono" placeholder="Ingrese el telefono">
            <input type="text" class="crear-menu-input form-control mb-3" id="gerenteCorreo" placeholder="Ingrese el correo">
        <hr>

        <!-- CONTROL CANTIDAD DE ALIMENTOS -->
        <div class="mb-3">
            <label class="form-label">Cantidad de alimentos (máx 6)</label>
        
            <div class="d-flex gap-2">
                <input type="number"
                       id="cantidadAlimentos"
                       class="crear-menu-input form-control"
                       min="1"
                       max="6"
                       placeholder="Ej: 3">
            
                <button class="crear-menu-btn btn btn-primary" onclick="generarAlimentos()">Generar</button>
            </div>
        </div>
        
        <!-- ALIMENTOS -->
        <div id="contenedorAlimentos" class="row"></div>

        <div class="d-flex gap-2">
            <!-- BOTÓN VOLVER -->
            <a href="index.html" class="col-md-6 crear-menu-btn btn btn-success flex-fill">Volver</a>
            <!-- GUARDAR MENÚ -->
            <button id="btnGuardar" class="col-md-6 crear-menu-btn btn btn-success flex-fill">Guardar Menú</button>
        </div>

    </div>
</div>

<script src="js/crear_menu.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
